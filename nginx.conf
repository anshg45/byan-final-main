server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API Proxy configuration removed to prevent startup crash on platforms where 'backend' service is not available.
    # The Frontend should communicate directly with the Backend URL (configured via VITE_API_URL).

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
